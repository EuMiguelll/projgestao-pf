services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cursos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cursos
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cursos -d cursos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: eumiguel/projgestao-back:latest
    pull_policy: always
    environment:
      PORT: 3000
      DATABASE_URL: postgres://cursos:${POSTGRES_PASSWORD}@postgres:5432/cursos
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      ALLOWED_ORIGINS: http://18.230.59.131,http://18.230.59.131:8080,http://18.230.59.131:8081,http://18.230.59.131:8082
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: eumiguel/projgestao-front:latest
    pull_policy: always
    ports:
      - "80:80"
      - "8080:80"
      - "8081:80"
      - "8082:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  pgdata:

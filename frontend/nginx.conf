server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback - refreshes on /cursos must serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Never cache the HTML shell
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
  }

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    application/javascript
    application/json
    application/xml
    text/css
    text/plain
    text/xml
    image/svg+xml;
}
